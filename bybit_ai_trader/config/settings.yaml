# Trading Bot Configuration

trading:
  mode: paper  # paper or live
  symbols: all  # or list of specific symbols
  opportunity_threshold: 90
  max_positions: 5
  max_leverage: 10
  
risk:
  risk_per_trade: 1.0  # percentage
  daily_loss_limit: 5.0  # percentage
  weekly_loss_limit: 10.0
  monthly_loss_limit: 20.0
  min_risk_reward: 2.0
  
indicators:
  timeframes:
    - 1m
    - 3m
    - 5m
    - 15m
    - 30m
    - 1h
    - 4h
    - 1d
  
  ema_periods: [20, 50, 100, 200]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  atr_period: 14
  bollinger_period: 20
  bollinger_std: 2.0
  
execution:
  default_sl_type: stop_loss
  default_tp_type: take_profit
  use_trailing_stop: true
  partial_exits: true
  
dashboard:
  refresh_rate: 1.0  # seconds
  show_all_symbols: false
  top_opportunities_count: 10
  
logging:
  level: INFO
  save_to_file: true
  rotation_size_mb: 10
  backup_count: 5

telegram:
  enabled: false
  notify_on_trade: true
  notify_on_error: true
  daily_summary: true
